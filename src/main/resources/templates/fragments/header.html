<header th:fragment="default">
  <nav class="bg-base-100 shadow-md">
    <div class="container navbar mx-auto">
      <div class="flex-1">
        <a th:href="@{/}" class="btn btn-ghost normal-case text-xl">ELF Watch</a>
      </div>
      <div class="flex-none" sec:authorize="isAuthenticated()">
        <div class="dropdown dropdown-end">
          <label tabindex="0" class="btn btn-ghost btn-circle avatar">
            <div class="w-10 border-solid border-2 rounded-full">
              <img th:src='${#authentication.getPrincipal().getAttributes().get("avatar_url")}' />
            </div>
          </label>
          <ul
            tabindex="0"
            class="menu menu-sm dropdown-content mt-3 z-[1] p-2 shadow bg-base-100/20 rounded-box w-52"
          >
            <li>
              <form th:action="@{/logout}" method="post" class="flex">
                <button type="submit" class="text-start grow">Logout</button>
              </form>
            </li>
          </ul>
        </div>
      </div>
    </div>
  </nav>
</header>
